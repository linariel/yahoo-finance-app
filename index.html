<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock Lookup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f0f4f8; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 720px; }
    h1 { font-size: 28px; color: #1a202c; margin-bottom: 6px; }
    p.sub { color: #718096; margin-bottom: 24px; font-size: 14px; }
    .search-bar { display: flex; gap: 8px; margin-bottom: 24px; }
    input { flex: 1; padding: 12px 16px; border-radius: 10px; border: 2px solid #e2e8f0; font-size: 15px; outline: none; }
    input:focus { border-color: #4f46e5; }
    button { padding: 12px 20px; background: #4f46e5; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-size: 15px; }
    button:hover { background: #4338ca; }

    /* Stock info card */
    .card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 16px; }
    .card h2 { font-size: 20px; color: #1a202c; }
    .card .price { font-size: 36px; font-weight: 700; color: #4f46e5; margin: 8px 0; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 12px; }
    .stat { background: #f7fafc; border-radius: 8px; padding: 10px 14px; }
    .stat .label { font-size: 11px; color: #a0aec0; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat .value { font-size: 16px; font-weight: 600; color: #2d3748; margin-top: 2px; }

    /* Table */
    .table-card { background: #fff; border-radius: 14px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); margin-bottom: 24px; }
    .table-card h3 { font-size: 16px; color: #1a202c; margin-bottom: 14px; font-weight: 600; }
    .table-wrapper { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
    thead tr { background: #4f46e5; color: #fff; }
    thead th { padding: 10px 14px; text-align: right; font-weight: 600; letter-spacing: 0.3px; }
    thead th:first-child { text-align: left; border-radius: 8px 0 0 0; }
    thead th:last-child { border-radius: 0 8px 0 0; }
    tbody tr { border-bottom: 1px solid #f0f4f8; transition: background 0.15s; }
    tbody tr:hover { background: #f7f7ff; }
    tbody td { padding: 9px 14px; text-align: right; color: #2d3748; }
    tbody td:first-child { text-align: left; color: #718096; font-size: 13px; }
    .up { color: #16a34a; font-weight: 600; }
    .down { color: #dc2626; font-weight: 600; }

    /* Download button */
    .dl-btn { display: inline-block; margin-top: 12px; padding: 8px 16px; background: #ede9fe; color: #4f46e5; border: none; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600; }
    .dl-btn:hover { background: #ddd6fe; }

    .error { color: #e53e3e; background: #fff5f5; padding: 14px; border-radius: 10px; border: 1px solid #fed7d7; }
    .loading { color: #718096; text-align: center; padding: 20px; }
    #result { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📈 Stock Lookup</h1>
    <p class="sub">Enter a ticker symbol to get live data and 1-month price history</p>
    <div class="search-bar">
      <input id="ticker" type="text" placeholder="e.g. AAPL, TSLA, MSFT" />
      <button onclick="fetchStock()">Search</button>
    </div>
    <div id="loading" class="loading" style="display:none">Fetching data...</div>
    <div id="result"></div>
  </div>

  <script>
    document.getElementById("ticker").addEventListener("keydown", e => {
      if (e.key === "Enter") fetchStock();
    });

    let currentHistory = [];
    let currentTicker  = "";

    async function fetchStock() {
      const ticker = document.getElementById("ticker").value.trim();
      if (!ticker) return;

      const loading = document.getElementById("loading");
      const result  = document.getElementById("result");
      loading.style.display = "block";
      result.style.display  = "none";

      try {
        // Fetch both endpoints in parallel
        const [infoRes, histRes] = await Promise.all([
          fetch(`/stock/${ticker}`),
          fetch(`/history/${ticker}?period=1mo`)
        ]);

        const info = await infoRes.json();
        const hist = await histRes.json();

        if (!infoRes.ok) {
          result.innerHTML = `<div class="error">⚠️ ${info.detail}</div>`;
          result.style.display = "block";
          loading.style.display = "none";
          return;
        }

        const fmt = v => (typeof v === "number" && v > 1000) ? v.toLocaleString() : v;

        // ── Info card ──────────────────────────────────────
        let html = `
          <div class="card">
            <h2>${info.name}</h2>
            <div class="price">${info.currency} ${info.price}</div>
            <div class="grid">
              <div class="stat"><div class="label">Symbol</div><div class="value">${info.symbol}</div></div>
              <div class="stat"><div class="label">Sector</div><div class="value">${info.sector}</div></div>
              <div class="stat"><div class="label">Market Cap</div><div class="value">${fmt(info.market_cap)}</div></div>
              <div class="stat"><div class="label">P/E Ratio</div><div class="value">${info.pe_ratio}</div></div>
              <div class="stat"><div class="label">52W High</div><div class="value">${info.currency} ${info["52w_high"]}</div></div>
              <div class="stat"><div class="label">52W Low</div><div class="value">${info.currency} ${info["52w_low"]}</div></div>
            </div>
          </div>`;

        // ── Price history table ────────────────────────────
        if (histRes.ok && hist.data && hist.data.length > 0) {
          currentHistory = hist.data;
          currentTicker  = info.symbol;

          // Reverse so newest date is on top
          const rows = [...hist.data].reverse();

          let tableRows = "";
          for (let i = 0; i < rows.length; i++) {
            const d = rows[i];
            // Daily change vs previous day (next in reversed array = previous date)
            const prev = rows[i + 1];
            let changeHtml = "—";
            if (prev) {
              const change    = d.close - prev.close;
              const changePct = ((change / prev.close) * 100).toFixed(2);
              const cls       = change >= 0 ? "up" : "down";
              const sign      = change >= 0 ? "+" : "";
              changeHtml = `<span class="${cls}">${sign}${change.toFixed(2)} (${sign}${changePct}%)</span>`;
            }
            tableRows += `
              <tr>
                <td>${d.date}</td>
                <td>${d.open.toFixed(2)}</td>
                <td>${d.high.toFixed(2)}</td>
                <td>${d.low.toFixed(2)}</td>
                <td><strong>${d.close.toFixed(2)}</strong></td>
                <td>${d.volume.toLocaleString()}</td>
                <td>${changeHtml}</td>
              </tr>`;
          }

          html += `
            <div class="table-card">
              <h3>📅 1-Month Price History — ${info.symbol}</h3>
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Date</th>
                      <th>Open</th>
                      <th>High</th>
                      <th>Low</th>
                      <th>Close</th>
                      <th>Volume</th>
                      <th>Change</th>
                    </tr>
                  </thead>
                  <tbody>${tableRows}</tbody>
                </table>
              </div>
              <button class="dl-btn" onclick="downloadCSV()">⬇ Download CSV</button>
            </div>`;
        }

        result.innerHTML = html;
        result.style.display = "block";

      } catch (err) {
        result.innerHTML = `<div class="error">⚠️ Network error. Is the server running?</div>`;
        result.style.display = "block";
      } finally {
        loading.style.display = "none";
      }
    }

    // ── CSV Download ───────────────────────────────────────
    function downloadCSV() {
      if (!currentHistory.length) return;
      const headers = ["Date", "Open", "High", "Low", "Close", "Volume"];
      const rows    = currentHistory.map(d =>
        [d.date, d.open, d.high, d.low, d.close, d.volume].join(",")
      );
      const csv  = [headers.join(","), ...rows].join("\n");
      const blob = new Blob([csv], { type: "text/csv" });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement("a");
      a.href     = url;
      a.download = `${currentTicker}_1mo.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
