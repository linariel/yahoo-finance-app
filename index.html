<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stock App</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#f0f4f8;color:#1a202c}
    header{background:#4f46e5;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px}
    header h1{font-size:22px}
    nav{display:flex;gap:4px;margin-left:auto}
    nav button{background:rgba(255,255,255,0.15);border:none;color:#fff;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:14px}
    nav button.active,nav button:hover{background:rgba(255,255,255,0.3)}
    .page{display:none;padding:24px;max-width:800px;margin:0 auto}
    .page.active{display:block}

    /* Search */
    .search-bar{display:flex;gap:8px;margin-bottom:20px}
    input[type=text],input[type=number]{padding:10px 14px;border-radius:10px;border:2px solid #e2e8f0;font-size:14px;outline:none;width:100%}
    input:focus{border-color:#4f46e5}
    .btn{padding:10px 18px;background:#4f46e5;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:14px;white-space:nowrap}
    .btn:hover{background:#4338ca}
    .btn-sm{padding:6px 12px;font-size:12px;border-radius:7px;border:none;cursor:pointer}
    .btn-red{background:#fee2e2;color:#dc2626}.btn-red:hover{background:#fecaca}
    .btn-blue{background:#e0e7ff;color:#4f46e5}.btn-blue:hover{background:#c7d2fe}
    .btn-green{background:#dcfce7;color:#16a34a}.btn-green:hover{background:#bbf7d0}

    /* Cards */
    .card{background:#fff;border-radius:14px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);margin-bottom:16px}
    .card h2{font-size:18px;margin-bottom:4px}
    .price{font-size:32px;font-weight:700;color:#4f46e5;margin:6px 0}
    .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}
    .stat{background:#f7fafc;border-radius:8px;padding:10px 14px}
    .stat .lbl{font-size:11px;color:#a0aec0;text-transform:uppercase}
    .stat .val{font-size:15px;font-weight:600;color:#2d3748;margin-top:2px}

    /* Table */
    .tbl-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead tr{background:#4f46e5;color:#fff}
    th{padding:9px 12px;text-align:right;font-weight:600}
    th:first-child{text-align:left}
    tbody tr{border-bottom:1px solid #f0f4f8}
    tbody tr:hover{background:#f7f7ff}
    td{padding:8px 12px;text-align:right}
    td:first-child{text-align:left}
    .up{color:#16a34a;font-weight:600}
    .down{color:#dc2626;font-weight:600}

    /* Form row */
    .form-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end}
    .form-row label{font-size:12px;color:#718096;display:block;margin-bottom:4px}
    .form-row .field{flex:1;min-width:120px}
    select{padding:10px 14px;border-radius:10px;border:2px solid #e2e8f0;font-size:14px;outline:none;width:100%}

    .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
    .badge-green{background:#dcfce7;color:#16a34a}
    .badge-red{background:#fee2e2;color:#dc2626}
    .badge-gray{background:#f1f5f9;color:#64748b}

    .empty{text-align:center;color:#cbd5e1;padding:30px;font-size:14px}
    .error{color:#dc2626;background:#fff5f5;padding:12px;border-radius:10px;border:1px solid #fecaca;margin-bottom:12px}
    .success{color:#16a34a;background:#f0fdf4;padding:12px;border-radius:10px;border:1px solid #bbf7d0;margin-bottom:12px}
    .loading{text-align:center;color:#94a3b8;padding:20px}

    /* History table */
    .dl-btn{display:inline-block;margin-top:10px;padding:7px 14px;background:#ede9fe;color:#4f46e5;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
    .dl-btn:hover{background:#ddd6fe}
  </style>
</head>
<body>

<header>
  <h1>📈 Stock App</h1>
  <nav>
    <button class="active" onclick="showPage('search')">🔍 Search</button>
    <button onclick="showPage('watchlist')">⭐ Watchlist</button>
    <button onclick="showPage('portfolio')">💼 Portfolio</button>
    <button onclick="showPage('alerts')">🔔 Alerts</button>
    <button onclick="showPage('prices')">💾 Prices</button>
  </nav>
</header>

<!-- ══ SEARCH PAGE ══ -->
<div class="page active" id="page-search">
  <div class="search-bar">
    <input id="s-ticker" type="text" placeholder="Enter ticker e.g. AAPL, TSLA"/>
    <button class="btn" onclick="searchStock()">Search</button>
  </div>
  <div id="s-msg"></div>
  <div id="s-result"></div>
</div>

<!-- ══ WATCHLIST PAGE ══ -->
<div class="page" id="page-watchlist">
  <div class="card">
    <h2 style="margin-bottom:14px">⭐ Add to Watchlist</h2>
    <div class="form-row">
      <div class="field"><label>Ticker</label><input type="text" id="w-ticker" placeholder="e.g. AAPL"/></div>
      <div class="field"><label>Note (optional)</label><input type="text" id="w-note" placeholder="e.g. Long term hold"/></div>
      <button class="btn" onclick="addWatchlist()">Add</button>
    </div>
    <div id="w-msg"></div>
  </div>
  <div class="card">
    <h2 style="margin-bottom:14px">My Watchlist</h2>
    <div id="w-list"><div class="loading">Loading...</div></div>
  </div>
</div>

<!-- ══ PORTFOLIO PAGE ══ -->
<div class="page" id="page-portfolio">
  <div class="card">
    <h2 style="margin-bottom:14px">💼 Add Position</h2>
    <div class="form-row">
      <div class="field"><label>Ticker</label><input type="text" id="p-ticker" placeholder="e.g. MSFT"/></div>
      <div class="field"><label>Quantity</label><input type="number" id="p-qty" placeholder="e.g. 10"/></div>
      <div class="field"><label>Buy Price</label><input type="number" id="p-price" placeholder="e.g. 150.00"/></div>
      <button class="btn" onclick="addPortfolio()">Add</button>
    </div>
    <div id="p-msg"></div>
  </div>
  <div class="card">
    <h2 style="margin-bottom:14px">My Portfolio</h2>
    <div id="p-list"><div class="loading">Loading...</div></div>
  </div>
</div>

<!-- ══ ALERTS PAGE ══ -->
<div class="page" id="page-alerts">
  <div class="card">
    <h2 style="margin-bottom:14px">🔔 Set Alert</h2>
    <div class="form-row">
      <div class="field"><label>Ticker</label><input type="text" id="a-ticker" placeholder="e.g. NVDA"/></div>
      <div class="field"><label>Target Price</label><input type="number" id="a-price" placeholder="e.g. 500"/></div>
      <div class="field">
        <label>Condition</label>
        <select id="a-cond"><option value="above">Above</option><option value="below">Below</option></select>
      </div>
      <button class="btn" onclick="addAlert()">Add</button>
    </div>
    <div id="a-msg"></div>
  </div>
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <h2>My Alerts</h2>
      <button class="btn-sm btn-green" onclick="checkAlerts()">⚡ Check Now</button>
    </div>
    <div id="a-triggered"></div>
    <div id="a-list"><div class="loading">Loading...</div></div>
  </div>
</div>

<!-- ══ PRICES PAGE ══ -->
<div class="page" id="page-prices">

  <!-- Fetch & Save from Yahoo -->
  <div class="card">
    <h2 style="margin-bottom:14px">💾 Fetch & Save Prices from Yahoo</h2>
    <div class="form-row">
      <div class="field"><label>Ticker</label><input type="text" id="fp-ticker" placeholder="e.g. AAPL"/></div>
      <div class="field">
        <label>Period</label>
        <select id="fp-period">
          <option value="1mo">1 Month</option>
          <option value="3mo">3 Months</option>
          <option value="6mo">6 Months</option>
          <option value="1y">1 Year</option>
        </select>
      </div>
      <button class="btn" onclick="fetchAndSave()">Fetch & Save</button>
    </div>
    <div id="fp-msg"></div>
  </div>

  <!-- Manual Add -->
  <div class="card">
    <h2 style="margin-bottom:14px">✏️ Add Price Manually</h2>
    <div class="form-row">
      <div class="field"><label>Ticker</label><input type="text" id="mp-ticker" placeholder="AAPL"/></div>
      <div class="field"><label>Date</label><input type="text" id="mp-date" placeholder="2024-01-15"/></div>
      <div class="field"><label>Open</label><input type="number" id="mp-open" placeholder="150.00"/></div>
      <div class="field"><label>High</label><input type="number" id="mp-high" placeholder="155.00"/></div>
      <div class="field"><label>Low</label><input type="number" id="mp-low" placeholder="148.00"/></div>
      <div class="field"><label>Close</label><input type="number" id="mp-close" placeholder="153.00"/></div>
      <div class="field"><label>Volume</label><input type="number" id="mp-vol" placeholder="1000000"/></div>
      <button class="btn" onclick="addPrice()">Add</button>
    </div>
    <div id="mp-msg"></div>
  </div>

  <!-- View Saved Prices -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <h2>📋 Saved Prices</h2>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="text" id="vp-ticker" placeholder="Filter by ticker" style="width:160px"/>
        <button class="btn-sm btn-blue" onclick="loadPrices()">🔍 Filter</button>
        <button class="btn-sm btn-red"  onclick="clearTickerPrices()">🗑 Delete Ticker</button>
      </div>
    </div>
    <div id="vp-msg"></div>
    <div id="vp-list"><div class="empty">Enter a ticker and click Filter to view saved prices.</div></div>
  </div>
</div>

<script>
// ── Navigation ─────────────────────────────────────────
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'watchlist') loadWatchlist();
  if (name === 'portfolio') loadPortfolio();
  if (name === 'prices') loadPrices();
}

function msg(id, text, type='success') {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="${type}">${text}</div>`;
  setTimeout(() => el.innerHTML = '', 3000);
}

// ── Search ─────────────────────────────────────────────
let currentHistory = [], currentTicker = '';

async function searchStock() {
  const ticker = document.getElementById('s-ticker').value.trim();
  if (!ticker) return;
  document.getElementById('s-result').innerHTML = '<div class="loading">Fetching data...</div>';

  const [iRes, hRes] = await Promise.all([
    fetch(`/stock/${ticker}`),
    fetch(`/history/${ticker}?period=1mo`)
  ]);
  const info = await iRes.json();
  const hist = await hRes.json();

  if (!iRes.ok) {
    document.getElementById('s-result').innerHTML = `<div class="error">⚠️ ${info.detail}</div>`;
    return;
  }

  const fmt = v => typeof v === 'number' && v > 1000 ? v.toLocaleString() : v;
  currentTicker  = info.symbol;
  currentHistory = hist.data || [];

  let rows = '';
  if (hist.data) {
    const rev = [...hist.data].reverse();
    rev.forEach((d, i) => {
      const prev = rev[i+1];
      let chg = '—';
      if (prev) {
        const c = d.close - prev.close, p = ((c/prev.close)*100).toFixed(2);
        const cls = c >= 0 ? 'up' : 'down', s = c >= 0 ? '+' : '';
        chg = `<span class="${cls}">${s}${c.toFixed(2)} (${s}${p}%)</span>`;
      }
      rows += `<tr>
        <td>${d.date}</td><td>${d.open.toFixed(2)}</td><td>${d.high.toFixed(2)}</td>
        <td>${d.low.toFixed(2)}</td><td><strong>${d.close.toFixed(2)}</strong></td>
        <td>${d.volume.toLocaleString()}</td><td>${chg}</td>
      </tr>`;
    });
  }

  document.getElementById('s-result').innerHTML = `
    <div class="card">
      <h2>${info.name}</h2>
      <div class="price">${info.currency} ${info.price}</div>
      <div style="margin-bottom:10px">
        <button class="btn-sm btn-blue" onclick="quickAdd('watchlist','${info.symbol}')">⭐ Add to Watchlist</button>
      </div>
      <div class="grid2">
        <div class="stat"><div class="lbl">Symbol</div><div class="val">${info.symbol}</div></div>
        <div class="stat"><div class="lbl">Sector</div><div class="val">${info.sector}</div></div>
        <div class="stat"><div class="lbl">Market Cap</div><div class="val">${fmt(info.market_cap)}</div></div>
        <div class="stat"><div class="lbl">P/E Ratio</div><div class="val">${info.pe_ratio}</div></div>
        <div class="stat"><div class="lbl">52W High</div><div class="val">${info.currency} ${info['52w_high']}</div></div>
        <div class="stat"><div class="lbl">52W Low</div><div class="val">${info.currency} ${info['52w_low']}</div></div>
      </div>
    </div>
    <div class="card">
      <h2 style="margin-bottom:12px">📅 1-Month Price History</h2>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>Date</th><th>Open</th><th>High</th><th>Low</th><th>Close</th><th>Volume</th><th>Change</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <button class="dl-btn" onclick="downloadCSV()">⬇ Download CSV</button>
    </div>`;
}

document.getElementById('s-ticker').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchStock();
});

async function quickAdd(type, ticker) {
  const res  = await fetch(`/${type}`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ticker, note:''}) });
  const data = await res.json();
  msg('s-msg', res.ok ? `✅ ${data.message}` : `⚠️ ${data.detail}`, res.ok ? 'success' : 'error');
}

function downloadCSV() {
  if (!currentHistory.length) return;
  const hdr  = ['Date','Open','High','Low','Close','Volume'];
  const rows = currentHistory.map(d => [d.date,d.open,d.high,d.low,d.close,d.volume].join(','));
  const blob = new Blob([[hdr.join(','),...rows].join('\n')], {type:'text/csv'});
  const a    = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:`${currentTicker}_1mo.csv`});
  a.click(); URL.revokeObjectURL(a.href);
}

// ── Watchlist ──────────────────────────────────────────
async function loadWatchlist() {
  const res  = await fetch('/watchlist');
  const data = await res.json();
  const el   = document.getElementById('w-list');
  if (!data.length) { el.innerHTML = '<div class="empty">No stocks in watchlist yet.</div>'; return; }
  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>Ticker</th><th>Note</th><th>Added</th><th>Actions</th></tr></thead>
    <tbody>${data.map(r => `
      <tr>
        <td><strong>${r.ticker}</strong></td>
        <td>${r.note || '—'}</td>
        <td>${r.added_at?.split('T')[0] || r.added_at}</td>
        <td style="text-align:right;display:flex;gap:6px;justify-content:flex-end">
          <button class="btn-sm btn-blue" onclick="editWatchlist(${r.id},'${r.ticker}','${r.note||''}')">✏️ Edit</button>
          <button class="btn-sm btn-red"  onclick="deleteWatchlist(${r.id})">🗑 Delete</button>
        </td>
      </tr>`).join('')}
    </tbody></table></div>`;
}

async function addWatchlist() {
  const ticker = document.getElementById('w-ticker').value.trim();
  const note   = document.getElementById('w-note').value.trim();
  if (!ticker) return;
  const res  = await fetch('/watchlist', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ticker, note})});
  const data = await res.json();
  msg('w-msg', res.ok ? `✅ ${data.message}` : `⚠️ ${data.detail}`, res.ok ? 'success' : 'error');
  if (res.ok) { document.getElementById('w-ticker').value=''; document.getElementById('w-note').value=''; loadWatchlist(); }
}

async function editWatchlist(id, ticker, note) {
  const newTicker = prompt('Edit ticker:', ticker);
  const newNote   = prompt('Edit note:', note);
  if (!newTicker) return;
  await fetch(`/watchlist/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ticker:newTicker, note:newNote||''})});
  loadWatchlist();
}

async function deleteWatchlist(id) {
  if (!confirm('Remove from watchlist?')) return;
  await fetch(`/watchlist/${id}`, {method:'DELETE'});
  loadWatchlist();
}

// ── Portfolio ──────────────────────────────────────────
async function loadPortfolio() {
  const el  = document.getElementById('p-list');
  el.innerHTML = '<div class="loading">Loading prices...</div>';
  const res  = await fetch('/portfolio');
  const data = await res.json();
  if (!data.length) { el.innerHTML = '<div class="empty">No positions yet.</div>'; return; }

  const totalVal = data.reduce((s,r) => s + (r.market_value || 0), 0);
  const totalPnl = data.reduce((s,r) => s + (r.pnl || 0), 0);
  const pnlCls   = totalPnl >= 0 ? 'up' : 'down';

  el.innerHTML = `
    <div class="grid2" style="margin-bottom:14px">
      <div class="stat"><div class="lbl">Total Value</div><div class="val">$${totalVal.toLocaleString(undefined,{minimumFractionDigits:2})}</div></div>
      <div class="stat"><div class="lbl">Total P&L</div><div class="val ${pnlCls}">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}</div></div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr><th>Ticker</th><th>Qty</th><th>Buy Price</th><th>Current</th><th>Value</th><th>P&L</th><th>Actions</th></tr></thead>
      <tbody>${data.map(r => {
        const pnlCls = r.pnl >= 0 ? 'up' : 'down';
        return `<tr>
          <td><strong>${r.ticker}</strong></td>
          <td>${r.quantity}</td>
          <td>$${r.buy_price.toFixed(2)}</td>
          <td>$${r.current_price}</td>
          <td>$${typeof r.market_value === 'number' ? r.market_value.toLocaleString(undefined,{minimumFractionDigits:2}) : r.market_value}</td>
          <td><span class="${pnlCls}">${r.pnl >= 0 ? '+' : ''}$${typeof r.pnl === 'number' ? r.pnl.toFixed(2) : r.pnl} (${r.pnl_pct}%)</span></td>
          <td style="display:flex;gap:6px;justify-content:flex-end">
            <button class="btn-sm btn-blue" onclick="editPortfolio(${r.id},'${r.ticker}',${r.quantity},${r.buy_price})">✏️</button>
            <button class="btn-sm btn-red"  onclick="deletePortfolio(${r.id})">🗑</button>
          </td>
        </tr>`;
      }).join('')}
      </tbody></table></div>`;
}

async function addPortfolio() {
  const ticker = document.getElementById('p-ticker').value.trim();
  const qty    = parseFloat(document.getElementById('p-qty').value);
  const price  = parseFloat(document.getElementById('p-price').value);
  if (!ticker || !qty || !price) { msg('p-msg','⚠️ Please fill in all fields','error'); return; }
  const res  = await fetch('/portfolio', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ticker, quantity:qty, buy_price:price})});
  const data = await res.json();
  msg('p-msg', res.ok ? `✅ ${data.message}` : `⚠️ ${data.detail}`, res.ok ? 'success' : 'error');
  if (res.ok) { ['p-ticker','p-qty','p-price'].forEach(id => document.getElementById(id).value=''); loadPortfolio(); }
}

async function editPortfolio(id, ticker, qty, price) {
  const t = prompt('Ticker:', ticker);
  const q = prompt('Quantity:', qty);
  const p = prompt('Buy Price:', price);
  if (!t || !q || !p) return;
  await fetch(`/portfolio/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ticker:t, quantity:parseFloat(q), buy_price:parseFloat(p)})});
  loadPortfolio();
}

async function deletePortfolio(id) {
  if (!confirm('Remove this position?')) return;
  await fetch(`/portfolio/${id}`, {method:'DELETE'});
  loadPortfolio();
}

// ── Alerts ─────────────────────────────────────────────
async function loadAlerts() {
  const res  = await fetch('/alerts');
  const data = await res.json();
  const el   = document.getElementById('a-list');
  if (!data.length) { el.innerHTML = '<div class="empty">No alerts set yet.</div>'; return; }
  el.innerHTML = `<div class="tbl-wrap"><table>
    <thead><tr><th>Ticker</th><th>Condition</th><th>Target</th><th>Status</th><th>Actions</th></tr></thead>
    <tbody>${data.map(r => `
      <tr>
        <td><strong>${r.ticker}</strong></td>
        <td>${r.condition === 'above' ? '📈 Above' : '📉 Below'}</td>
        <td>$${r.target_price}</td>
        <td>${r.triggered
          ? '<span class="badge badge-green">✅ Triggered</span>'
          : '<span class="badge badge-gray">⏳ Watching</span>'}</td>
        <td style="display:flex;gap:6px;justify-content:flex-end">
          <button class="btn-sm btn-blue" onclick="editAlert(${r.id},'${r.ticker}',${r.target_price},'${r.condition}')">✏️ Edit</button>
          <button class="btn-sm btn-red"  onclick="deleteAlert(${r.id})">🗑 Delete</button>
        </td>
      </tr>`).join('')}
    </tbody></table></div>`;
}

async function addAlert() {
  const ticker = document.getElementById('a-ticker').value.trim();
  const price  = parseFloat(document.getElementById('a-price').value);
  const cond   = document.getElementById('a-cond').value;
  if (!ticker || !price) { msg('a-msg','⚠️ Please fill in all fields','error'); return; }
  const res  = await fetch('/alerts', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ticker, target_price:price, condition:cond})});
  const data = await res.json();
  msg('a-msg', res.ok ? `✅ ${data.message}` : `⚠️ ${data.detail}`, res.ok ? 'success' : 'error');
  if (res.ok) { ['a-ticker','a-price'].forEach(id => document.getElementById(id).value=''); loadAlerts(); }
}

async function editAlert(id, ticker, price, cond) {
  const t = prompt('Ticker:', ticker);
  const p = prompt('Target Price:', price);
  const c = prompt('Condition (above/below):', cond);
  if (!t || !p || !c) return;
  await fetch(`/alerts/${id}`, {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ticker:t, target_price:parseFloat(p), condition:c})});
  loadAlerts();
}

async function deleteAlert(id) {
  if (!confirm('Delete this alert?')) return;
  await fetch(`/alerts/${id}`, {method:'DELETE'});
  loadAlerts();
}

async function checkAlerts() {
  const res  = await fetch('/alerts/check');
  const data = await res.json();
  const el   = document.getElementById('a-triggered');
  if (data.triggered.length) {
    el.innerHTML = data.triggered.map(t =>
      `<div class="success">🔔 <strong>${t.ticker}</strong> hit $${t.price} (target: $${t.target})</div>`
    ).join('');
  } else {
    el.innerHTML = '<div class="success">✅ Checked — no alerts triggered yet.</div>';
  }
  loadAlerts();
}
// ── Stock Prices ───────────────────────────────────────
async function fetchAndSave() {
  const ticker = document.getElementById('fp-ticker').value.trim();
  const period = document.getElementById('fp-period').value;
  if (!ticker) { msg('fp-msg','⚠️ Enter a ticker','error'); return; }
  msg('fp-msg', '⏳ Fetching from Yahoo Finance...', 'success');
  const res  = await fetch(`/prices/fetch/${ticker}?period=${period}`, {method:'POST'});
  const data = await res.json();
  msg('fp-msg', res.ok ? `✅ ${data.message}` : `⚠️ ${data.detail}`, res.ok ? 'success' : 'error');
  if (res.ok) { document.getElementById('vp-ticker').value = ticker; loadPrices(); }
}

async function addPrice() {
  const fields = ['mp-ticker','mp-date','mp-open','mp-high','mp-low','mp-close','mp-vol'];
  const [ticker,date,open,high,low,close,volume] = fields.map(id => document.getElementById(id).value.trim());
  if (!ticker||!date||!open||!high||!low||!close||!volume) { msg('mp-msg','⚠️ Fill in all fields','error'); return; }
  const res  = await fetch('/prices', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ticker, date, open:+open, high:+high, low:+low, close:+close, volume:+volume})
  });
  const data = await res.json();
  msg('mp-msg', res.ok ? `✅ ${data.message}` : `⚠️ ${data.detail}`, res.ok ? 'success' : 'error');
  if (res.ok) { fields.forEach(id => document.getElementById(id).value=''); loadPrices(); }
}

async function loadPrices() {
  const ticker = document.getElementById('vp-ticker').value.trim();
  const el     = document.getElementById('vp-list');
  if (!ticker) { el.innerHTML = '<div class="empty">Enter a ticker and click Filter to view saved prices.</div>'; return; }
  el.innerHTML = '<div class="loading">Loading...</div>';
  const res  = await fetch(`/prices/${ticker}`);
  if (!res.ok) { el.innerHTML = `<div class="empty">No saved prices for <strong>${ticker.toUpperCase()}</strong> yet. Use Fetch & Save above.</div>`; return; }
  const data = await res.json();

  el.innerHTML = `
    <div class="tbl-wrap"><table>
      <thead><tr><th>Date</th><th>Open</th><th>High</th><th>Low</th><th>Close</th><th>Volume</th><th>Actions</th></tr></thead>
      <tbody>${data.map(r => `
        <tr id="row-${r.id}">
          <td>${r.date}</td>
          <td id="open-${r.id}">${r.open.toFixed(2)}</td>
          <td id="high-${r.id}">${r.high.toFixed(2)}</td>
          <td id="low-${r.id}">${r.low.toFixed(2)}</td>
          <td id="close-${r.id}"><strong>${r.close.toFixed(2)}</strong></td>
          <td>${r.volume.toLocaleString()}</td>
          <td style="display:flex;gap:6px;justify-content:flex-end">
            <button class="btn-sm btn-blue" onclick="editPrice(${r.id},'${r.ticker}','${r.date}',${r.open},${r.high},${r.low},${r.close},${r.volume})">✏️ Edit</button>
            <button class="btn-sm btn-red"  onclick="deletePrice(${r.id})">🗑</button>
          </td>
        </tr>`).join('')}
      </tbody>
    </table></div>
    <button class="dl-btn" onclick="downloadPriceCSV(${JSON.stringify(data).replace(/"/g,'&quot;')}, '${ticker.toUpperCase()}')">⬇ Download CSV</button>`;
}

async function editPrice(id, ticker, date, open, high, low, close, volume) {
  const o = prompt('Open:',  open);
  const h = prompt('High:',  high);
  const l = prompt('Low:',   low);
  const c = prompt('Close:', close);
  const v = prompt('Volume:', volume);
  if (!o||!h||!l||!c||!v) return;
  const res = await fetch(`/prices/${id}`, {
    method:'PUT', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ticker, date, open:+o, high:+h, low:+l, close:+c, volume:+v})
  });
  const data = await res.json();
  msg('vp-msg', res.ok ? `✅ ${data.message}` : `⚠️ ${data.detail}`, res.ok ? 'success' : 'error');
  if (res.ok) loadPrices();
}

async function deletePrice(id) {
  if (!confirm('Delete this price record?')) return;
  await fetch(`/prices/${id}`, {method:'DELETE'});
  loadPrices();
}

async function clearTickerPrices() {
  const ticker = document.getElementById('vp-ticker').value.trim();
  if (!ticker) { msg('vp-msg','⚠️ Enter a ticker first','error'); return; }
  if (!confirm(`Delete ALL saved prices for ${ticker.toUpperCase()}?`)) return;
  const res  = await fetch(`/prices/ticker/${ticker}`, {method:'DELETE'});
  const data = await res.json();
  msg('vp-msg', `✅ ${data.message}`, 'success');
  loadPrices();
}

function downloadPriceCSV(data, ticker) {
  const hdr  = ['Date','Open','High','Low','Close','Volume'];
  const rows = data.map(r => [r.date,r.open,r.high,r.low,r.close,r.volume].join(','));
  const blob = new Blob([[hdr.join(','),...rows].join('\n')], {type:'text/csv'});
  const a    = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:`${ticker}_prices.csv`});
  a.click(); URL.revokeObjectURL(a.href);
}
</script>
